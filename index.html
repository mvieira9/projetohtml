<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Ciência da Computação</title>
</head>
<script>
        const nomeImagemCC = [
        {text: "é programação.", image:"img/programacao.jpg"}, 
        {text: "é matemática.", image:"img/matematica.jpg"},
        {text: "é design.", image: "img/design.jpg"},
        {text: "é sistemas operacionais.", image: "img/sistemaoperacional.jpg"},
        {text: "é Internet das Coisas.", image: "img/iot.jpg"},
        {text: "é inteligência artificial.", image: "img/ia.jpg"},
        {text: "é banco de dados.", image: "img/bancodedados.jpg"}
    ];

        let i = 0;

    setInterval (() => {
        i = (i + 1) % nomeImagemCC.length;
        document.getElementById("cc-texto-variavel").innerText = nomeImagemCC[i].text;
         document.getElementById("cc-imagem-variavel").src = nomeImagemCC[i].image;
        }, 1500)
    </script>
<body> 
    <div class="container-landing">
    <div class="text-landing">
        <h1>Ciência da Computação</h1>
        <p id="cc-texto-variavel">é banco de dados.</p>
        <nav>
        <a href="curso.html">conheça mais.</a>
        </nav>
    </div>
    <img id="cc-imagem-variavel" src="img/bancodedados.jpg" class="landing-page-image">
    </div>
    <footer class="footer-landing">
    <p>© 2026 Turma de Ciência da Computação — Instituto Federal de Santa Catarina, Campus Lages.</p>
    </footer>   
</body>
</html>
